<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather</title>
    <link rel="stylesheet" href="wethr.css">
</head>

<body>

    <div class="card">
        <div class="srch-box">
            <input type="text" name="serch" id="input" placeholder="Enter City Name" spellcheck="false">
            <button id="serch"><img src="images/search.png" alt="Search"></button>
        </div>
        <div class="error">
            <p>Invalid city name</p>
        </div>

        <div class="weather">
            <img src="images/clouds.png" alt="Weather Icon" class="wther-icon">
            <h1 class="temp">34°C</h1>
            <h2 class="city">Okara</h2>

            <div class="details">
                <div class="col">
                    <img src="images/humidity.png" alt="humidity" class="hum-icon">
                    <div>
                        <p class="humidity">50%</p>
                        <p>Humidity</p>
                    </div>
                </div>
                <div class="col">
                    <img src="images/wind.png" alt="wind">
                    <div>
                        <p class="wind">15 km/h</p>
                        <p>Wind Speed</p>
                    </div>
                </div>
            </div>
        </div>


    </div>

    <script src="wethr.js"></script>
</body>

</html>
